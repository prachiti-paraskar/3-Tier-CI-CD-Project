
name: Node.js CICD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compile:
    runs-on: Agent-1
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js 
      uses: actions/setup-node@v4
      with:
        node-version: "23"
        
    - name: Frontend Compilation (Syntax Check)
      run: |
        cd client
        find . -name "*.js" -exec node --check {} +

    - name: Backend Compilation (Syntax Check)
      run: |
        cd api
        find . -name "*.js" -exec node --check {} +        

  gitleaks-scan:
    runs-on: Agent-1
    needs: compile
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Gitleaks Setup
      uses: gitleaks/gitleaks-action@v2

    - name: Gitleaks Scan
      run: |
        gitleaks detect --source ./client --exit-code 1
        gitleaks detect --source ./api --exit-code 1

  trivy_fs_scan:
    runs-on: Agent-1
    needs: gitleaks-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy FS Scan
        run: |
          trivy fs \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            .
        
  sonar-frontend:
    runs-on: Agent-1
    needs: trivy_fs_scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sonarqube Scan (client)
        uses: sonarsource/sonarqube-scan-action@master
        with:
          projectBaseDir: client  #instead od working directory
          args: >
            -Dsonar.projectKey=myorg_api
            -Dsonar.projectName=myorg_api
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**
        env:
          SONAR_TOKEN: $ {{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: $ {{ secrets.SONAR_HOST_URL }}
          
  sonar-backend:
    runs-on: Agent-1
    needs: sonar-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sonarqube Scan (api)
        uses: sonarsource/sonarqube-scan-action@master
        with:
          projectBaseDir: api  #instead od working directory
          args: >
            -Dsonar.projectKey=myorg_api
            -Dsonar.projectName=myorg_api
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**
        env:
          SONAR_TOKEN: $ {{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: $ {{ secrets.SONAR_HOST_URL }}          
          
  
