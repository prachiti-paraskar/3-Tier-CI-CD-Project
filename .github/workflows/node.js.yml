
name: Node.js CICD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compile:
    runs-on: Agent-1
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js 
      uses: actions/setup-node@v4
      with:
        node-version: "23"
        
    - name: Frontend Compilation (Syntax Check)
      run: |
        cd client
        find . -name "*.js" -exec node --check {} +

    - name: Backend Compilation (Syntax Check)
      run: |
        cd api
        find . -name "*.js" -exec node --check {} +        

  gitleaks-scan:
    runs-on: Agent-1
    needs: compile
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Gitleaks Setup
      uses: gitleaks/gitleaks-action@v2

    - name: Gitleaks Scan
      run: |
        gitleaks detect --source ./client --exit-code 1
        gitleaks detect --source ./api --exit-code 1

  trivy_fs_scan:
    runs-on: Agent-1
    needs: gitleaks-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy FS Scan
        run: |
          trivy fs \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            .
        
  sonar-frontend:
    runs-on: Agent-1
    needs: trivy_fs_scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sonarqube Scan (client)
        uses: sonarsource/sonarqube-scan-action@master
        with:
          projectBaseDir: client  #instead od working directory
          args: >
            -Dsonar.projectKey=myorg_client
            -Dsonar.projectName=myorg_client
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          
  sonar-backend:
    runs-on: Agent-1
    needs: sonar-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sonarqube Scan (api)
        uses: sonarsource/sonarqube-scan-action@master
        with:
          projectBaseDir: api  #instead od working directory
          args: >
            -Dsonar.projectKey=myorg_api
            -Dsonar.projectName=myorg_api
            -Dsonar.sources=.
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}          
          
  build_backend_docker_image_and_push:
    runs-on: ubuntu-latest
    needs: sonar-backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker HUb
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
      - name: Setup docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: ppp27/backend:latest
          file: ./api/Dockerfile

  build_frontend_docker_image_and_push:
     runs-on: ubuntu-latest
     needs: sonar-backend
     steps:
       - name: Checkout code
         uses: actions/checkout@v4

       - name: Login to Docker HUb
         uses: docker/login-action@v3
         with:
           username: ${{ vars.DOCKERHUB_USERNAME }}
           password: ${{ secrets.DOCKERHUB_TOKEN }}
       - name: Setup QEMU
         uses: docker/setup-qemu-action@v3
       - name: Setup docker Buildx
         uses: docker/setup-buildx-action@v3
       - name: Build and Push Docker Image
         uses: docker/build-push-action@v6
         with:
           context: ./client
           push: true
           tags: ppp27/frontend:latest
           file: ./client/Dockerfile

  trivy_image_scan:
    runs-on: Agent-1
    needs: build_frontend_docker_image_and_push  #or whatever job built/pushed your image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.1
        with:
          version: latest

      - name: Trivy Scan Backend Image
        run: |
          trivy image \
           --severity CRITICAL,HIGH \
           --ignore-unfixed \
           ppp27/backend:latest

      - name: Trivy Scan Frontend Image
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            ppp27/frontend:latest

  deploy_to_kubernetes:
    runs-on: Agent-1
    needs: trivy_image_scan
    steps:
      - name: Checkout COde
        uses: actions/checkout@v4
      - name: Inststall AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with: 
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Setup kubectl  
        uses: azure/setup-kubectl@v3
        with: 
          version: latest
      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.EKS_KUBECONFIG }}" > $HOME/.kube/config
      - name: Create prod namespace
        run: kubectl create namespace prod --dry-run=client -o yaml | kubectl apply -f -
      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s-prod/sc.yaml
          kubectl apply -f k8s-prod/mysql.yaml
          kubectl apply -f k8s-prod/backend.yaml
          kubectl apply -f k8s-prod/frontend.yaml
          kubectl apply -f k8s-prod/ci.yaml
          kubectl apply -f k8s-prod/ingress.yaml


           
    
#end
