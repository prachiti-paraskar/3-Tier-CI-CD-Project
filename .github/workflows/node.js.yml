

name: Node.js CICD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compile:
    runs-on: Agent-1
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js 
      uses: actions/setup-node@v4
      with:
        node-version: "23"
        
    - name: Frontend Compilation (Syntax Check)
      run: |
        cd client
        find . -name "*.js" -exec node --check {} +

    - name: Backend Compilation (Syntax Check)
      run: |
        cd api
        find . -name "*.js" -exec node --check {} +        

  gitleaks-scan:
    runs-on: Agent-1
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Gitleaks Setup
      uses: gitleaks/gitleaks-action@2

    - name: Gitleaks Scan
      run: |
        gitleaks detect --sourcec ./client --exit-code 1
        gitleaks detect --sourcec ./api --exit-code 1
     
    
